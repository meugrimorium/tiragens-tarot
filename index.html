<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sua Tiragem</title>

    <!-- Fonte principal Pirate One -->
    <link href="https://fonts.googleapis.com/css2?family=Pirata+One&display=swap" rel="stylesheet">

    <style>
        :root {
            --roxo: #8b698e;
            --verde: #6c724d;
            --dourado: #c9a86a;
            --creme: #e8dcc2;
            --cinza: #d9d9d9;
            --marrom: #403c39;
            --bg-escuro: #1a1716;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-escuro);
            color: var(--creme);
            font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;

            /* Fundo carregado com brilhos e símbolos (compatível com Vercel) */
            background-image:
                url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='300' height='300'><rect width='300' height='300' fill='%231a1716'/><text x='20' y='40' fill='%23c9a86a' font-size='28'>✦</text><text x='120' y='90' fill='%238b698e' font-size='24'>✧</text><text x='200' y='150' fill='%236c724d' font-size='26'>✶</text><text x='80' y='200' fill='%23c9a86a' font-size='30'>☾</text><text x='160' y='260' fill='%238b698e' font-size='26'>♃</text><text x='40' y='140' fill='%23c9a86a' font-size='22'>✹</text><text x='220' y='40' fill='%238b698e' font-size='20'>♄</text><text x='260' y='200' fill='%236c724d' font-size='24'>✷</text></svg>");
            background-size: 300px 300px;
            background-repeat: repeat;
        }

        h1, h2 {
            font-family: 'Pirata One', serif;
            color: var(--creme);
            text-align: center;
            letter-spacing: 2px;
            margin-top: 0;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 24px 16px 40px;
            text-align: center;
        }

        .selector {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin: 24px auto 32px;
            flex-wrap: wrap;
        }

        .selector button {
            background-color: var(--verde);
            color: var(--creme);
            border: none;
            padding: 10px 18px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Pirata One', serif;
            letter-spacing: 1px;
            transition: 0.25s ease;
        }

        .selector button:hover {
            background-color: var(--dourado);
            color: var(--marrom);
            transform: translateY(-1px);
        }

        .cards-area {
            margin-top: 10px;
        }

        .cards-area img {
            width: 180px;
            max-width: 40vw;
            margin: 10px;
            border-radius: 20px;
            border: 3px solid var(--dourado);
            background-color: var(--marrom);
            box-shadow: 0 0 18px rgba(0, 0, 0, 0.6);
        }

        .hidden {
            display: none;
        }

        .options {
            font-size: 15px;
            margin-bottom: 10px;
            font-weight: bold;
            color: var(--creme);
            line-height: 1.5;
        }

        .options p {
            margin: 2px 0;
        }

        @media (max-width: 600px) {
            .selector button {
                width: 100%;
                max-width: 260px;
            }

            .cards-area img {
                width: 140px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Sua Tiragem</h1>

        <div class="selector">
            <button type="button" onclick="showOneCard()">Tiragem de 1 Carta</button>
            <button type="button" onclick="showThreeCards()">Tiragem de 3 Cartas</button>
        </div>

        <!-- Tiragem de 1 carta -->
        <div id="oneCard" class="cards-area hidden">
            <h2>Uma Carta</h2>
            <img id="singleCardImg" src="" alt="Carta de Tarot" />
        </div>

        <!-- Tiragem de 3 cartas -->
        <div id="threeCards" class="cards-area hidden">
            <h2>Tiragem 1 • 2 • 3</h2>

            <div class="options">
                <p>• Passado — Presente — Futuro</p>
                <p>• Situação — Desafio — Conselho</p>
                <p>• Você — O Outro — A Relação</p>
                <p>• O Que Aconteceu — O Que Está Acontecendo — O Que Virá</p>
            </div>

            <img id="card1" src="" alt="Carta 1" />
            <img id="card2" src="" alt="Carta 2" />
            <img id="card3" src="" alt="Carta 3" />
        </div>
    </div>

        function drawRandomCard() {
            const index = Math.floor(Math.random() * tarotDeck.length);
            return tarotDeck[index];
        }

        function hideAll() {
            document.getElementById("oneCard").classList.add("hidden");
            document.getElementById("threeCards").classList.add("hidden");
        }

        function showOneCard() {
            hideAll();
            const oneCard = document.getElementById("oneCard");
            const img = document.getElementById("singleCardImg");
            img.src = drawRandomCard();
            oneCard.classList.remove("hidden");
        }

        function showThreeCards() {
            hideAll();
            const threeCards = document.getElementById("threeCards");
            document.getElementById("card1").src = drawRandomCard();
            document.getElementById("card2").src = drawRandomCard();
            document.getElementById("card3").src = drawRandomCard();
            threeCards.classList.remove("hidden");
        }
    </script>
</body>
</html>
