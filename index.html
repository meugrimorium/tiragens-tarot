<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sua Tiragem</title>

    <!-- Fonte principal Pirate One -->
    <link href="https://fonts.googleapis.com/css2?family=Pirata+One&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1716;
            color: #e8dcc2;
            font-family: 'Segoe UI', sans-serif;

            /* Fundo com brilhinhos e símbolos místicos */
            background-image:
                url("data:image/svg+xml;utf8,
                <svg xmlns='http://www.w3.org/2000/svg' width='300' height='300'>
                    <text x='20' y='40' fill='%23c9a86a' font-size='22'>✦</text>
                    <text x='120' y='90' fill='%238b698e' font-size='18'>✧</text>
                    <text x='200' y='150' fill='%236c724d' font-size='20'>✶</text>
                    <text x='80' y='200' fill='%23c9a86a' font-size='24'>☾</text>
                    <text x='160' y='260' fill='%238b698e' font-size='20'>♃</text>
                </svg>");
            background-size: 300px;
            background-repeat: repeat;
        }

        h1, h2 {
            font-family: 'Pirata One', serif;
            color: #e8dcc2;
            text-align: center;
            letter-spacing: 2px;
        }

        .container {
            max-width: 900px;
            margin: auto;
            padding: 20px;
            text-align: center;
        }

        .selector {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .selector button {
            background-color: #6c724d;
            color: #e8dcc2;
            border: none;
            padding: 12px 20px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Pirata One';
            transition: 0.3s;
        }

        .selector button:hover {
            background-color: #c9a86a;
            color: #403c39;
        }

        .cards-area img {
            width: 180px;
            margin: 10px;
            border-radius: 16px; /* cantos arredondados */
            border: 3px solid #c9a86a;
            background-color: #403c39;
        }

        .hidden {
            display: none;
        }

        .options {
            font-size: 15px;
            margin-bottom: 10px;
            font-weight: bold;
            color: #e8dcc2;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Sua Tiragem</h1>

        <div class="selector">
            <button onclick="showOneCard()">Tiragem de 1 Carta</button>
            <button onclick="showThreeCards()">Tiragem de 3 Cartas</button>
        </div>

        <!-- Tiragem de 1 carta -->
        <div id="oneCard" class="cards-area hidden">
            <h2>Uma Carta</h2>
            <img id="singleCardImg" src="" alt="Carta de Tarot" />
        </div>

        <!-- Tiragem de 3 cartas -->
        <div id="threeCards" class="cards-area hidden">
            <h2>Tiragem 1 • 2 • 3</h2>

            <div class="options">
                <p>• Passado — Presente — Futuro</p>
                <p>• Situação — Desafio — Conselho</p>
                <p>• Você — O Outro — A Relação</p>
                <p>• O Que Aconteceu — O Que Está Acontecendo — O Que Virá</p>
            </div>

            <img id="card1" src="" alt="Carta 1" />
            <img id="card2" src="" alt="Carta 2" />
            <img id="card3" src="" alt="Carta 3" />
        </div>

    </div>

    <script>
        // Cartas Rider-Waite que realmente existem no acervo público
        const tarotDeck = [
            "https://www.sacred-texts.com/tarot/pkt/img/ar00.jpg",
            "https://www.sacred-texts.com/tarot/pkt/img/ar01.jpg",
            "https://www.sacred-texts.com/tarot/pkt/img/ar02.jpg",
            "https://www.sacred-texts.com/tarot/pkt/img/ar03.jpg",
            "https://www.sacred-texts.com/tarot/pkt/img/ar04.jpg",
            "https://www.sacred-texts.com/tarot/pkt/img/ar05.jpg",
            "https://www.sacred-texts.com/tarot/pkt/img/ar06.jpg",
            "https://www.sacred-texts.com/tarot/pkt/img/ar07.jpg",
            "https://www.sacred-texts.com/tarot/pkt/img/ar08.jpg",
            "https://www.sacred-texts.com/tarot/pkt/img/ar09.jpg",
            "https://www.sacred-texts.com/tarot/pkt/img/ar10.jpg",
            "https://www.sacred-texts.com/tarot/pkt/img/ar11.jpg",
            "https://www.sacred-texts.com/tarot/pkt/img/ar12.jpg",
            "https://www.sacred-texts.com/tarot/pkt/img/ar13.jpg",
            "https://www.sacred-texts.com/tarot/pkt/img/ar14.jpg",
            "https://www.sacred-texts.com/tarot/pkt/img/ar15.jpg",
            "https://www.sacred-texts.com/tarot/pkt/img/ar16.jpg",
            "https://www.sacred-texts.com/tarot/pkt/img/ar17.jpg",
            "https://www.sacred-texts.com/tarot/pkt/img/ar18.jpg",
            "https://www.sacred-texts.com/tarot/pkt/img/ar19.jpg",
            "https://www.sacred-texts.com/tarot/pkt/img/ar20.jpg",
            "https://www.sacred-texts.com/tarot/pkt/img/ar21.jpg"
        ];

        function drawRandomCard() {
            const index = Math.floor(Math.random() * tarotDeck.length);
            return tarotDeck[index];
        }

        function showOneCard() {
            document.getElementById("oneCard").classList.remove("hidden");
            document.getElementById("threeCards").classList.add("hidden");

            document.getElementById("singleCardImg").src = drawRandomCard();
        }

        function showThreeCards() {
            document.getElementById("threeCards").classList.remove("hidden");
            document.getElementById("oneCard").classList.add("hidden");

            document.getElementById("card1").src = drawRandomCard();
            document.getElementById("card2").src = drawRandomCard();
            document.getElementById("card3").src = drawRandomCard();
        }
    </script>

</body>
</html>
